# Gitleaks configuration for SDDP
# https://github.com/gitleaks/gitleaks

title = "SDDP Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "SDDP development allowlist"
paths = [
    '''\.env\.example$''',
]
# Known placeholder patterns — not real secrets
regexes = [
    '''CHANGE_THIS_TO_A_SECURE_SECRET_KEY''',
    '''change_me_in_production''',
    '''sddp_password''',
    '''sddp''',
    '''\$2[aby]\$\d{2}\$[./A-Za-z0-9]{53}''',
]
